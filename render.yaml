# Render Blueprint — one-click deploy of the read-only verifiable-trading dashboard.
# Connect this public repo in the Render dashboard (New > Blueprint). It builds
# Dockerfile.display (Injective wiring baked in) and serves the dashboard at a public
# URL, rendering the committed Injective testnet demo data. No keys, no live loop.
services:
  - type: web
    name: sumplus-trader-injective
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.display
    healthCheckPath: /
    autoDeploy: true
