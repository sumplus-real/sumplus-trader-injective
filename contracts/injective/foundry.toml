[profile.default]
src = "."
out = "out"
libs = []
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true            # precompile structs + many string args -> avoids "stack too deep"

# Self-contained: IExchange.sol + SpotExecutor.sol compile with no external libs.
# Build:  forge build
# Deploy: ./deploy.sh   (reads .deploy.env)
